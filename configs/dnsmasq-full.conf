# ============================================
# SOC-PME Full Stack - DNS Configuration (dnsmasq)
# Résolution DNS interne pour les services
# ============================================

# Interface binding
interface=eth1.10
interface=eth1.20
interface=eth1.30
bind-interfaces

# ============================================
# DHCP Configuration - VLAN 30 (LAN)
# ============================================
dhcp-range=interface:eth1.30,172.16.30.100,172.16.30.254,24h
dhcp-option=interface:eth1.30,option:router,172.16.30.1
dhcp-option=interface:eth1.30,option:dns-server,172.16.30.1
dhcp-option=interface:eth1.30,option:domain-name,soc-pme.local
dhcp-option=interface:eth1.30,option:ntp-server,172.16.30.1

# ============================================
# DNS Upstream
# ============================================
server=8.8.8.8
server=1.1.1.1
server=9.9.9.9

# ============================================
# Local Domain
# ============================================
domain=soc-pme.local
local=/soc-pme.local/
expand-hosts

# ============================================
# DNS Records - VLAN 10 (SOC)
# ============================================
# Portal principal
address=/portal.soc-pme.local/172.16.10.1
address=/home.soc-pme.local/172.16.10.1

# SIEM
address=/siem.soc-pme.local/172.16.10.1
address=/kibana.soc-pme.local/172.16.10.1
address=/elastic.soc-pme.local/172.16.10.1

# SOAR
address=/soar.soc-pme.local/172.16.10.1
address=/n8n.soc-pme.local/172.16.10.1

# Proxy Admin
address=/proxy.soc-pme.local/172.16.10.1
address=/traefik.soc-pme.local/172.16.10.1

# ============================================
# DNS Records - VLAN 20 (Services)
# ============================================
# Nextcloud
address=/cloud.soc-pme.local/172.16.20.1
address=/nextcloud.soc-pme.local/172.16.20.1
address=/files.soc-pme.local/172.16.20.1

# Collabora
address=/office.soc-pme.local/172.16.20.1
address=/collabora.soc-pme.local/172.16.20.1

# Mail
address=/mail.soc-pme.local/172.16.20.1
address=/webmail.soc-pme.local/172.16.20.1
address=/smtp.soc-pme.local/172.16.20.1
address=/imap.soc-pme.local/172.16.20.1
address=/pop.soc-pme.local/172.16.20.1

# Autodiscover (pour clients mail)
address=/autoconfig.soc-pme.local/172.16.20.1
address=/autodiscover.soc-pme.local/172.16.20.1

# ============================================
# MX Record for Mail
# ============================================
mx-host=soc-pme.local,mail.soc-pme.local,10

# ============================================
# SRV Records for Autodiscovery
# ============================================
srv-host=_submission._tcp.soc-pme.local,mail.soc-pme.local,587
srv-host=_imap._tcp.soc-pme.local,mail.soc-pme.local,143
srv-host=_imaps._tcp.soc-pme.local,mail.soc-pme.local,993
srv-host=_pop3._tcp.soc-pme.local,mail.soc-pme.local,110
srv-host=_pop3s._tcp.soc-pme.local,mail.soc-pme.local,995

# ============================================
# Security
# ============================================
# Block DNS rebinding attacks
stop-dns-rebind
rebind-localhost-ok

# DNS SEC validation (optional)
# dnssec
# trust-anchor=.,20326,8,2,E06D44B80B8F1D39A95C0B0D7C65D08458E880409BBC683457104237C7F8EC8D

# ============================================
# Logging (for SIEM)
# ============================================
log-queries
log-facility=/var/log/dnsmasq.log

# ============================================
# Performance
# ============================================
cache-size=1000
neg-ttl=60
local-ttl=300
