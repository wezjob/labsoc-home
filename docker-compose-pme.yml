# ============================================
# SOC-PME Appliance - Docker Compose (Optimized for 4GB RAM)
# ============================================
# Target Hardware: i7 4-cores, 4GB RAM, 128GB SSD
# VLANs: 10 (SOC), 20 (Security), 30 (LAN)
# ============================================

version: '3.8'

services:
  # ============================================
  # SURICATA IDS/IPS - Network Security Monitor
  # ============================================
  suricata:
    image: jasonish/suricata:latest
    container_name: soc-pme-suricata
    network_mode: host    # Required for packet capture
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - NET_RAW
    environment:
      - SURICATA_OPTIONS=-i eth1 --set vars.address-groups.HOME_NET=[172.16.10.0/24,172.16.20.0/24,172.16.30.0/24]
    volumes:
      - ./suricata/config/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/var/lib/suricata/rules:ro
      - suricata-logs:/var/log/suricata
      - suricata-run:/var/run/suricata
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  # ============================================
  # ELASTICSEARCH - SIEM Backend (Optimized)
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: soc-pme-elasticsearch
    environment:
      - node.name=soc-pme-es
      - cluster.name=soc-pme-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.ml.enabled=false              # Disable ML to save RAM
      - xpack.graph.enabled=false
      - xpack.watcher.enabled=false
      - indices.memory.index_buffer_size=10%
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-SecureSocPme2024!}
      - "ES_JAVA_OPTS=-Xms768m -Xmx768m"    # Reduced from 1GB
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "172.16.10.10:9200:9200"            # Only accessible from VLAN SOC
    networks:
      soc-internal:
        ipv4_address: 172.18.0.10
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-SecureSocPme2024!} http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 60s
      timeout: 30s
      retries: 3
    restart: unless-stopped

  # ============================================
  # KIBANA - SIEM Dashboard (Optimized)
  # ============================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: soc-pme-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-SecureSocPme2024!}
      - XPACK_SECURITY_ENABLED=true
      - XPACK_REPORTING_ENABLED=false       # Disable reporting to save RAM
      - XPACK_MAPS_ENABLED=false
      - NODE_OPTIONS=--max-old-space-size=384
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "172.16.10.10:5601:5601"            # Only accessible from VLAN SOC
    networks:
      soc-internal:
        ipv4_address: 172.18.0.11
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 384M
    restart: unless-stopped

  # ============================================
  # LOGSTASH LIGHT - Log Pipeline (Reduced)
  # ============================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: soc-pme-logstash
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"    # Reduced from 512m
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-SecureSocPme2024!}
      - PIPELINE_WORKERS=2
      - PIPELINE_BATCH_SIZE=125
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./logstash/config/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"                          # Beats input
      - "5514:5514/udp"                      # Syslog input
    networks:
      soc-internal:
        ipv4_address: 172.18.0.12
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 256M
    restart: unless-stopped

  # ============================================
  # FILEBEAT - Log Shipper (Lightweight)
  # ============================================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: soc-pme-filebeat
    user: root
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-SecureSocPme2024!}
    volumes:
      - ./filebeat/config/filebeat-pme.yml:/usr/share/filebeat/filebeat.yml:ro
      - suricata-logs:/var/log/suricata:ro
      - /var/log:/var/log/host:ro
    networks:
      soc-internal:
        ipv4_address: 172.18.0.13
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    restart: unless-stopped

  # ============================================
  # N8N - SOAR Automation (Lightweight)
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: soc-pme-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-soc-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-SecureSocPme2024!}
      - N8N_HOST=172.16.10.10
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://172.16.10.10:5678/
      - GENERIC_TIMEZONE=Europe/Paris
      - EXECUTIONS_DATA_PRUNE=true          # Auto-cleanup old executions
      - EXECUTIONS_DATA_MAX_AGE=168         # 7 days retention
      - NODE_OPTIONS=--max-old-space-size=128
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "172.16.10.10:5678:5678"            # Only accessible from VLAN SOC
    networks:
      soc-internal:
        ipv4_address: 172.18.0.14
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 128M
    restart: unless-stopped

  # ============================================
  # REDIS - Cache & Queue (Minimal)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: soc-pme-redis
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      soc-internal:
        ipv4_address: 172.18.0.15
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    restart: unless-stopped

  # ============================================
  # HOMEPAGE - SOC Dashboard Portal
  # ============================================
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: soc-pme-homepage
    environment:
      - HOMEPAGE_VAR_TITLE=SOC-PME Dashboard
    volumes:
      - ./homepage/config:/app/config
    ports:
      - "172.16.10.10:80:3000"              # Main portal on SOC VLAN
    networks:
      soc-internal:
        ipv4_address: 172.18.0.20
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    restart: unless-stopped

# ============================================
# NETWORKS
# ============================================
networks:
  soc-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
          gateway: 172.18.0.1

# ============================================
# VOLUMES
# ============================================
volumes:
  elasticsearch-data:
    driver: local
    driver_opts:
      type: none
      device: /opt/soc-pme/data/elasticsearch
      o: bind
  suricata-logs:
    driver: local
    driver_opts:
      type: none
      device: /opt/soc-pme/logs/suricata
      o: bind
  suricata-run:
    driver: local
  n8n-data:
    driver: local
    driver_opts:
      type: none
      device: /opt/soc-pme/data/n8n
      o: bind
  redis-data:
    driver: local
