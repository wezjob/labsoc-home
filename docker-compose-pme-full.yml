# ============================================
# SOC-PME Appliance - Full Stack Edition
# Includes: SOC + Nextcloud + Mail (Mailu)
# ============================================
# Target Hardware: i7 4-cores, 8GB RAM, 256GB SSD
# VLANs: 10 (SOC), 20 (Security/Services), 30 (LAN)
# ============================================

version: '3.8'

services:
  # ============================================
  # SURICATA IDS/IPS - Network Security Monitor
  # ============================================
  suricata:
    image: jasonish/suricata:latest
    container_name: soc-pme-suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - NET_RAW
    environment:
      - SURICATA_OPTIONS=-i eth1 --set vars.address-groups.HOME_NET=[172.16.10.0/24,172.16.20.0/24,172.16.30.0/24]
    volumes:
      - ./suricata/config/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/var/lib/suricata/rules:ro
      - suricata-logs:/var/log/suricata
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ============================================
  # ELASTICSEARCH - SIEM Backend
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: soc-pme-elasticsearch
    environment:
      - node.name=soc-pme-es
      - cluster.name=soc-pme-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.ml.enabled=false
      - xpack.graph.enabled=false
      - xpack.watcher.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-SecureSocPme2024!}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "172.16.10.1:9200:9200"
    networks:
      soc-internal:
        ipv4_address: 172.18.0.10
    deploy:
      resources:
        limits:
          memory: 1280M
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-SecureSocPme2024!} http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 60s
      timeout: 30s
      retries: 3
    restart: unless-stopped

  # ============================================
  # KIBANA - SIEM Dashboard
  # ============================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: soc-pme-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-SecureSocPme2024!}
      - XPACK_SECURITY_ENABLED=true
      - XPACK_REPORTING_ENABLED=false
      - NODE_OPTIONS=--max-old-space-size=512
    ports:
      - "172.16.10.1:5601:5601"
    networks:
      soc-internal:
        ipv4_address: 172.18.0.11
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 640M
    restart: unless-stopped

  # ============================================
  # LOGSTASH - Log Pipeline
  # ============================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: soc-pme-logstash
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-SecureSocPme2024!}
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/config/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
      - "5514:5514/udp"
    networks:
      soc-internal:
        ipv4_address: 172.18.0.12
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
    restart: unless-stopped

  # ============================================
  # FILEBEAT - Log Shipper
  # ============================================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: soc-pme-filebeat
    user: root
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-SecureSocPme2024!}
    volumes:
      - ./filebeat/config/filebeat-pme.yml:/usr/share/filebeat/filebeat.yml:ro
      - suricata-logs:/var/log/suricata:ro
      - /var/log:/var/log/host:ro
      - nextcloud-logs:/var/log/nextcloud:ro
    networks:
      soc-internal:
        ipv4_address: 172.18.0.13
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  # ============================================
  # N8N - SOAR Automation
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: soc-pme-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-soc-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-SecureSocPme2024!}
      - N8N_HOST=172.16.10.1
      - N8N_PORT=5678
      - WEBHOOK_URL=http://172.16.10.1:5678/
      - GENERIC_TIMEZONE=Europe/Paris
      - NODE_OPTIONS=--max-old-space-size=128
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "172.16.10.1:5678:5678"
    networks:
      soc-internal:
        ipv4_address: 172.18.0.14
    deploy:
      resources:
        limits:
          memory: 192M
    restart: unless-stopped

  # ============================================
  # REDIS - Cache for all services
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: soc-pme-redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      soc-internal:
        ipv4_address: 172.18.0.15
    deploy:
      resources:
        limits:
          memory: 96M
    restart: unless-stopped

  # ============================================
  # POSTGRESQL - Database for Nextcloud & Mail
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: soc-pme-postgres
    environment:
      - POSTGRES_USER=socpme
      - POSTGRES_PASSWORD=${DB_PASSWORD:-SecureSocPme2024!}
      - POSTGRES_MULTIPLE_DATABASES=nextcloud,mailu
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    networks:
      soc-internal:
        ipv4_address: 172.18.0.16
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ============================================
  # NEXTCLOUD - Private Cloud & Collaboration
  # VLAN 20 - Services
  # ============================================
  nextcloud:
    image: nextcloud:28-apache
    container_name: soc-pme-nextcloud
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=socpme
      - POSTGRES_PASSWORD=${DB_PASSWORD:-SecureSocPme2024!}
      - NEXTCLOUD_ADMIN_USER=${NC_ADMIN:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NC_PASSWORD:-SecureSocPme2024!}
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.soc-pme.local 172.16.20.10
      - REDIS_HOST=redis
      - OVERWRITEPROTOCOL=https
      - PHP_MEMORY_LIMIT=512M
      - PHP_UPLOAD_LIMIT=10G
    volumes:
      - nextcloud-data:/var/www/html
      - nextcloud-logs:/var/log/nextcloud
    ports:
      - "172.16.20.1:8080:80"
    networks:
      soc-internal:
        ipv4_address: 172.18.0.20
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped

  # ============================================
  # COLLABORA ONLINE - Office Suite for Nextcloud
  # ============================================
  collabora:
    image: collabora/code:latest
    container_name: soc-pme-collabora
    environment:
      - domain=cloud\\.soc-pme\\.local
      - username=${COLLABORA_USER:-admin}
      - password=${COLLABORA_PASSWORD:-SecureSocPme2024!}
      - extra_params=--o:ssl.enable=false
    cap_add:
      - MKNOD
    ports:
      - "172.16.20.1:9980:9980"
    networks:
      soc-internal:
        ipv4_address: 172.18.0.21
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ============================================
  # MAILU - Mail Server (Front)
  # VLAN 20 - Services
  # ============================================
  mailu-front:
    image: mailu/nginx:2.0
    container_name: soc-pme-mailu-front
    environment:
      - TZ=Europe/Paris
      - LOG_LEVEL=WARNING
    volumes:
      - mailu-certs:/certs:ro
      - mailu-overrides:/overrides:ro
    ports:
      # SMTP
      - "172.16.20.1:25:25"
      - "172.16.20.1:465:465"
      - "172.16.20.1:587:587"
      # IMAP
      - "172.16.20.1:143:143"
      - "172.16.20.1:993:993"
      # POP3
      - "172.16.20.1:110:110"
      - "172.16.20.1:995:995"
      # Webmail
      - "172.16.20.1:8443:443"
    networks:
      soc-internal:
        ipv4_address: 172.18.0.30
    depends_on:
      - mailu-admin
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  mailu-admin:
    image: mailu/admin:2.0
    container_name: soc-pme-mailu-admin
    environment:
      - TZ=Europe/Paris
      - SECRET_KEY=${MAILU_SECRET:-ChangeThisSecretKey123!}
      - DOMAIN=soc-pme.local
      - HOSTNAMES=mail.soc-pme.local
      - POSTMASTER=admin
      - AUTH_RATELIMIT_IP=60/hour
      - AUTH_RATELIMIT_USER=100/day
      - ADMIN=true
      - WEBMAIL=roundcube
      - WEBDAV=none
      - ANTIVIRUS=clamav
      - ANTISPAM_ENABLED=true
      - MESSAGE_SIZE_LIMIT=52428800
      - DB_FLAVOR=postgresql
      - DB_HOST=postgres
      - DB_NAME=mailu
      - DB_USER=socpme
      - DB_PW=${DB_PASSWORD:-SecureSocPme2024!}
    volumes:
      - mailu-data:/data
      - mailu-dkim:/dkim
    networks:
      soc-internal:
        ipv4_address: 172.18.0.31
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  mailu-smtp:
    image: mailu/postfix:2.0
    container_name: soc-pme-mailu-smtp
    environment:
      - TZ=Europe/Paris
      - LOG_LEVEL=WARNING
    volumes:
      - mailu-mailqueue:/queue
      - mailu-overrides:/overrides:ro
    networks:
      soc-internal:
        ipv4_address: 172.18.0.32
    depends_on:
      - mailu-admin
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  mailu-imap:
    image: mailu/dovecot:2.0
    container_name: soc-pme-mailu-imap
    environment:
      - TZ=Europe/Paris
      - LOG_LEVEL=WARNING
    volumes:
      - mailu-mail:/mail
      - mailu-overrides:/overrides:ro
    networks:
      soc-internal:
        ipv4_address: 172.18.0.33
    depends_on:
      - mailu-admin
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  mailu-antispam:
    image: mailu/rspamd:2.0
    container_name: soc-pme-mailu-antispam
    environment:
      - TZ=Europe/Paris
      - LOG_LEVEL=WARNING
    volumes:
      - mailu-filter:/var/lib/rspamd
      - mailu-overrides:/overrides:ro
    networks:
      soc-internal:
        ipv4_address: 172.18.0.34
    depends_on:
      - mailu-admin
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  mailu-webmail:
    image: mailu/webmail:2.0
    container_name: soc-pme-mailu-webmail
    environment:
      - TZ=Europe/Paris
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailu-imap
    networks:
      soc-internal:
        ipv4_address: 172.18.0.35
    depends_on:
      - mailu-imap
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  # ============================================
  # CLAMAV - Antivirus for Mail
  # ============================================
  clamav:
    image: mailu/clamav:2.0
    container_name: soc-pme-clamav
    volumes:
      - mailu-filter:/data
    networks:
      soc-internal:
        ipv4_address: 172.18.0.36
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ============================================
  # TRAEFIK - Reverse Proxy & SSL
  # ============================================
  traefik:
    image: traefik:v2.10
    container_name: soc-pme-traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ADMIN_EMAIL:-admin@soc-pme.local}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "172.16.10.1:8081:8080"  # Dashboard on SOC VLAN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      soc-internal:
        ipv4_address: 172.18.0.2
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  # ============================================
  # HOMEPAGE - SOC Dashboard Portal
  # ============================================
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: soc-pme-homepage
    volumes:
      - ./homepage/config:/app/config
    ports:
      - "172.16.10.1:3000:3000"
    networks:
      soc-internal:
        ipv4_address: 172.18.0.50
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

# ============================================
# NETWORKS
# ============================================
networks:
  soc-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
          gateway: 172.18.0.1

# ============================================
# VOLUMES
# ============================================
volumes:
  # SOC
  elasticsearch-data:
  suricata-logs:
  n8n-data:
  redis-data:
  traefik-certs:
  
  # Database
  postgres-data:
  
  # Nextcloud
  nextcloud-data:
  nextcloud-logs:
  
  # Mailu (Mail)
  mailu-data:
  mailu-certs:
  mailu-dkim:
  mailu-mail:
  mailu-mailqueue:
  mailu-filter:
  mailu-overrides:
