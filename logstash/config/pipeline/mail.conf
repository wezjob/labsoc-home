# ============================================
# Logstash Pipeline - Mail Logs
# Parse Mailu/Postfix/Dovecot logs
# ============================================

input {
  # Syslog from Mailu containers
  syslog {
    port => 5515
    type => "mail"
    tags => ["mailu", "mail"]
  }
}

filter {
  if [type] == "mail" {
    # Parse Postfix logs
    if "postfix" in [program] {
      grok {
        match => { "message" => "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:hostname} %{DATA:program}\[%{POSINT:pid}\]: %{GREEDYDATA:postfix_message}" }
      }
      
      # Extract queue ID
      grok {
        match => { "postfix_message" => "%{WORD:queue_id}: %{GREEDYDATA:details}" }
        tag_on_failure => []
      }
      
      # Parse from/to
      if "from=" in [details] {
        grok {
          match => { "details" => "from=<%{EMAILADDRESS:mail_from}>" }
          tag_on_failure => []
        }
      }
      
      if "to=" in [details] {
        grok {
          match => { "details" => "to=<%{EMAILADDRESS:mail_to}>" }
          tag_on_failure => []
        }
      }
      
      # Parse status
      if "status=" in [details] {
        grok {
          match => { "details" => "status=%{WORD:mail_status}" }
          tag_on_failure => []
        }
      }
      
      # Detect rejected/bounced
      if [mail_status] == "bounced" or [mail_status] == "rejected" {
        mutate {
          add_tag => ["mail_rejected"]
        }
      }
    }
    
    # Parse Dovecot logs
    if "dovecot" in [program] {
      grok {
        match => { "message" => "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:hostname} %{DATA:program}\[%{POSINT:pid}\]: %{DATA:dovecot_service}: %{GREEDYDATA:dovecot_message}" }
      }
      
      # Extract login info
      if "Login:" in [dovecot_message] {
        grok {
          match => { "dovecot_message" => "Login: user=<%{DATA:mail_user}>, method=%{WORD:auth_method}, rip=%{IP:client_ip}" }
          tag_on_failure => []
        }
        mutate {
          add_tag => ["mail_login"]
        }
      }
      
      # Detect failed logins
      if "auth failed" in [dovecot_message] or "Authentication failed" in [dovecot_message] {
        mutate {
          add_tag => ["mail_auth_failed"]
        }
      }
    }
    
    # Parse Rspamd logs
    if "rspamd" in [program] {
      grok {
        match => { "message" => "%{GREEDYDATA:rspamd_message}" }
      }
      
      # Detect spam
      if "spam" in [rspamd_message] or "reject" in [rspamd_message] {
        mutate {
          add_tag => ["spam_detected"]
        }
      }
    }
    
    # GeoIP for client IPs
    if [client_ip] {
      geoip {
        source => "client_ip"
        target => "geoip"
      }
    }
  }
}

output {
  if [type] == "mail" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "soc-pme-mail-%{+YYYY.MM.dd}"
    }
    
    # Alert on auth failures
    if "mail_auth_failed" in [tags] {
      http {
        url => "http://n8n:5678/webhook/mail-auth-failed"
        http_method => "post"
        format => "json"
      }
    }
  }
}
