# ============================================
# Logstash Pipeline - Nextcloud Logs
# Parse Nextcloud audit and access logs
# ============================================

input {
  file {
    path => "/var/log/nextcloud/nextcloud.log"
    type => "nextcloud"
    codec => "json"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_nextcloud"
    tags => ["nextcloud", "collaboration"]
  }
}

filter {
  if [type] == "nextcloud" {
    # Parse timestamp
    date {
      match => ["time", "ISO8601"]
      target => "@timestamp"
    }
    
    # Extract user info
    if [user] {
      mutate {
        add_field => { "nc_user" => "%{user}" }
      }
    }
    
    # Categorize by level
    if [level] >= 3 {
      mutate {
        add_tag => ["nc_error"]
      }
    }
    
    # Detect security events
    if [app] == "admin_audit" {
      mutate {
        add_tag => ["nc_audit"]
      }
      
      # Login events
      if "login" in [message] or "Login" in [message] {
        mutate {
          add_tag => ["nc_login"]
        }
      }
      
      # Failed login
      if "failed" in [message] or "Failed" in [message] {
        mutate {
          add_tag => ["nc_login_failed", "security_alert"]
        }
      }
      
      # File operations
      if "file_" in [message] or "created" in [message] or "deleted" in [message] {
        mutate {
          add_tag => ["nc_file_operation"]
        }
      }
      
      # Sharing
      if "share" in [message] or "Share" in [message] {
        mutate {
          add_tag => ["nc_share"]
        }
      }
      
      # User management
      if "user_" in [message] {
        mutate {
          add_tag => ["nc_user_mgmt"]
        }
      }
    }
    
    # Extract IP and GeoIP
    if [remoteAddr] {
      geoip {
        source => "remoteAddr"
        target => "geoip"
      }
    }
    
    # Remove unnecessary fields
    mutate {
      remove_field => ["host", "path"]
    }
  }
}

output {
  if [type] == "nextcloud" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "soc-pme-nextcloud-%{+YYYY.MM.dd}"
    }
    
    # Alert on failed logins
    if "nc_login_failed" in [tags] {
      http {
        url => "http://n8n:5678/webhook/nextcloud-login-failed"
        http_method => "post"
        format => "json"
      }
    }
    
    # Alert on suspicious shares
    if "nc_share" in [tags] {
      http {
        url => "http://n8n:5678/webhook/nextcloud-share"
        http_method => "post"
        format => "json"
      }
    }
  }
}
